<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SAKURA SPA Recruit Rich Menu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 2500px; height: 1686px; overflow: hidden; }
  body {
    background: #fffbfa;
    position: relative;
    font-family: "Yu Gothic", "Meiryo", sans-serif;
  }
  /* 背景の桜グロー */
  .glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 1400px 900px at 12% -8%, rgba(251,113,133,0.14), transparent 65%),
      radial-gradient(ellipse 1400px 900px at 92% 112%, rgba(251,113,133,0.13), transparent 65%),
      radial-gradient(ellipse 1000px 700px at 50% 50%, rgba(253,164,175,0.08), transparent 70%);
  }
  .petals { position: absolute; inset: 0; }

  .grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }
  .cell {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    border-right: 2px solid rgba(244,63,94,0.16);
    border-bottom: 2px solid rgba(244,63,94,0.16);
  }
  .cell:nth-child(3n) { border-right: none; }
  .cell:nth-child(n+4) { border-bottom: none; }

  .icon-wrap {
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,228,230,0.7);
    border: 2px solid rgba(244,63,94,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .icon-wrap svg { width: 112px; height: 112px; stroke: #e11d48; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

  .ja-main {
    font-size: 78px;
    letter-spacing: 0.14em;
    color: #44403c;
    font-weight: 700;
  }
  .en {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 38px;
    letter-spacing: 0.28em;
    color: #fb7185;
    text-transform: uppercase;
  }
  .badge {
    position: absolute;
    top: 52px; left: 50%;
    transform: translateX(-50%);
    font-size: 36px;
    letter-spacing: 0.12em;
    color: #be123c;
    background: rgba(255,228,230,0.9);
    border: 2px solid rgba(244,63,94,0.35);
    border-radius: 999px;
    padding: 10px 36px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* 応募セル(強調) */
  .cell.apply {
    background: linear-gradient(150deg, #fb7185 0%, #e11d48 60%, #be123c 100%);
  }
  .cell.apply .icon-wrap {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.6);
  }
  .cell.apply .icon-wrap svg { stroke: #ffffff; }
  .cell.apply .ja-main { color: #ffffff; }
  .cell.apply .en { color: #ffe4e6; }
  .cell.apply .badge {
    color: #be123c;
    background: #ffffff;
    border-color: #ffffff;
  }

  .sakura-mark {
    position: absolute;
    top: 40px; right: 52px;
    font-family: Georgia, serif;
    font-size: 34px;
    letter-spacing: 0.35em;
    color: rgba(225,29,72,0.45);
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <!-- 桜の花びら(装飾) -->
  <svg class="petals" viewBox="0 0 2500 1686" xmlns="http://www.w3.org/2000/svg">
    <g fill="rgba(251,113,133,0.16)">
      <path d="M180 150 q30 -45 60 0 q-30 45 -60 0z" transform="rotate(25 210 150)"/>
      <path d="M2300 120 q26 -40 52 0 q-26 40 -52 0z" transform="rotate(-30 2326 120)"/>
      <path d="M2260 1560 q30 -45 60 0 q-30 45 -60 0z" transform="rotate(45 2290 1560)"/>
      <path d="M130 1580 q26 -40 52 0 q-26 40 -52 0z" transform="rotate(-15 156 1580)"/>
      <path d="M780 90 q22 -34 44 0 q-22 34 -44 0z" transform="rotate(60 802 90)"/>
      <path d="M1720 1620 q22 -34 44 0 q-22 34 -44 0z" transform="rotate(-50 1742 1620)"/>
    </g>
  </svg>

  <div class="grid">
    <!-- 1: 応募する -->
    <div class="cell apply">
      <div class="badge">未経験大歓迎</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M22 3 L11 13"/>
          <path d="M22 3 L15 21 L11 13 L3 9 Z"/>
        </svg>
      </div>
      <div class="ja-main">応募する</div>
      <div class="en">Apply</div>
    </div>

    <!-- 2: 給与・報酬 -->
    <div class="cell">
      <div class="badge">高バック保証</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M7 4 L12 11 L17 4"/>
          <line x1="12" y1="11" x2="12" y2="20"/>
          <line x1="8" y1="13.5" x2="16" y2="13.5"/>
          <line x1="8" y1="16.5" x2="16" y2="16.5"/>
        </svg>
      </div>
      <div class="ja-main">給与・報酬</div>
      <div class="en">Salary</div>
    </div>

    <!-- 3: 待遇・働き方 -->
    <div class="cell">
      <div class="badge">自由出勤・1日3h〜</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12,6.5 12,12 16,14.5"/>
        </svg>
      </div>
      <div class="ja-main">待遇・働き方</div>
      <div class="en">Work Style</div>
    </div>

    <!-- 4: 体験入店 -->
    <div class="cell">
      <div class="badge">1日だけでもOK</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M12 3 l2.4 5.2 5.6 0.7 -4.1 3.9 1.1 5.6 -5 -2.8 -5 2.8 1.1 -5.6 -4.1 -3.9 5.6 -0.7z"/>
        </svg>
      </div>
      <div class="ja-main">体験入店</div>
      <div class="en">Trial</div>
    </div>

    <!-- 5: よくある質問 -->
    <div class="cell">
      <div class="badge">研修サポートあり</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9.5 9.3 a2.5 2.5 0 1 1 3.4 2.3 c-0.7 0.3 -0.9 0.8 -0.9 1.6"/>
          <circle cx="12" cy="16.6" r="0.4"/>
        </svg>
      </div>
      <div class="ja-main">よくある質問</div>
      <div class="en">Q&amp;A</div>
    </div>

    <!-- 6: お店について -->
    <div class="cell">
      <div class="badge">インバウンド専門店</div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M4 10 L12 4 L20 10"/>
          <path d="M6 9 V19 a1 1 0 0 0 1 1 h10 a1 1 0 0 0 1 -1 V9"/>
          <path d="M10 20 v-5 h4 v5"/>
        </svg>
      </div>
      <div class="ja-main">お店について</div>
      <div class="en">About Us</div>
    </div>
  </div>

</body>
</html>
